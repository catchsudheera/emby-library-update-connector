version: "3"
services:
  emby-connector:
    image: catchsudheera/emby-library-update-connector:2.0.0
    container_name: emby-connector
    environment:
      - EMBY_URL=${EMBY_URL}
      - EMBY_ACCESS_TOKEN=${EMBY_ACCESS_TOKEN}
      - EMBY_FULL_REFRESH_TIMEOUT_MINS=30               # optional. default : 30 minutes
      - SONARR_MEDIA_DIRECTORIES=tv                     # optional. default : tv
      - RADARR_MEDIA_DIRECTORIES=movies                 # optional. default : movies
    ports:
      - 9400:8080
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
